<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GP-50 Converter</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>GP-50 Converter</h1>
    <p class="subtitle">NAM A2 &rarr; A1 batch conversion for the Valeton GP-50</p>
  </header>

  <main>
    <section class="card">
      <h2>1. Files</h2>
      <div id="drop-zone" class="drop-zone" tabindex="0">
        <p>Drag &amp; drop <code>.nam</code> files here, or</p>
        <button type="button" id="file-picker-btn">Choose files&hellip;</button>
        <input type="file" id="file-input" accept=".nam" multiple hidden />
      </div>
      <ul id="file-list" class="file-list"></ul>
    </section>

    <section class="card">
      <h2>2. Config</h2>
      <div class="config-grid">
        <div class="field">
          <label>Output format</label>
          <div class="format-toggle" id="format-toggle">
            <label class="radio-pill">
              <input type="radio" name="output_format" id="format-05x" value="0.5x" checked />
              0.5.x (GP-50)
            </label>
            <label class="radio-pill disabled" title="Not wired yet — see task T1b">
              <input type="radio" name="output_format" id="format-070" value="0.7.0" disabled />
              0.7.0 <span class="badge">coming soon</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="epochs">Epochs</label>
          <div class="epochs-row">
            <input type="number" id="epochs" min="1" step="1" value="100" />
            <button type="button" id="fast-preset">Fast (test)</button>
          </div>
        </div>

        <div class="field">
          <label>DI reference</label>
          <div id="di-info" class="readonly-field">Official v3_0_0 (default)</div>
        </div>
      </div>
    </section>

    <section class="card actions">
      <button type="button" id="convert-btn" disabled>Convert</button>
      <div id="error-banner" class="error-banner" role="alert" hidden></div>
    </section>

    <section class="card" id="results-section" hidden>
      <h2>3. Progress</h2>
      <div id="results"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
