<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GP-50 Preset Explorer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <nav class="top-nav">
      <div class="brand">
        <div class="brand-logo">GP</div>
        <div><div class="brand-name">GP-50 Suite</div><div class="brand-sub">Companion</div></div>
      </div>
      <div class="nav-pills">
        <a href="/">Convert</a>
        <a href="/device">Device Inspector</a>
        <a href="/explorer" class="active">Preset Explorer</a>
      </div>
      <div class="nav-spacer"></div>
      <button type="button" id="theme-toggle" class="theme-toggle">☾ Dark</button>
    </nav>
  </header>
  <div class="page-head">
    <h1>Preset Explorer</h1>
    <p class="subtitle">Every preset's active chain at <code>Block · Type · Model</code> granularity &mdash; filter by block, drive type, reverb model, anything</p>
  </div>

  <div id="source-note" class="source-note" role="status">parsed from exported patches</div>

  <div class="scan-row">
    <button type="button" id="scan-btn">⟳ Scan presets from device</button>
    <div id="scan-progress" class="scan-progress" hidden>
      <div class="scan-bar"><div id="scan-fill" class="scan-fill"></div></div>
      <span id="scan-status" class="subtitle"></span>
    </div>
  </div>

  <main class="explorer-main">
    <section class="card filter-card">
      <div class="lib-head">
        <input type="search" id="preset-search" placeholder="Search presets, models, types&hellip;" class="lib-search" />
        <span id="result-count" class="subtitle"></span>
      </div>
      <div class="filter-row">
        <div id="filter-bar" class="filter-bar"></div>
        <label class="official-toggle" title="Show the real gear a model is based on (Green OD → Ibanez TS808) where known">
          <span>Show real hardware names</span>
          <input type="checkbox" id="official-toggle" checked />
          <span class="switch-ui"></span>
        </label>
      </div>
      <div id="active-filters" class="active-filters"></div>
      <div class="saved-row">
        <button type="button" id="save-filter" class="linkish" disabled>★ Save this filter set</button>
        <div id="saved-filters" class="saved-filters"></div>
      </div>
    </section>

    <section class="card">
      <ul id="preset-list" class="preset-list"></ul>
      <p id="preset-empty" class="subtitle" hidden>No presets match these filters.</p>
    </section>
  </main>

  <script src="/static/theme.js"></script>
  <script src="/static/explorer.js"></script>
</body>
</html>
